; Motion Pro — Stage 1 LCD pin validation demo (ESP32-S3 + ST7789V2 240x280)
;
; Deploy:
;   cd firmware/screen_demo
;   python -m platformio run -t upload
;   python -m platformio device monitor
;
; If upload fails with no COM port:
;   1. Plug ESP32 in with a DATA-capable USB cable (not charge-only)
;   2. Run: powershell -File find-port.ps1
;   3. Set the COM port in platformio.local.ini
;
; Edit include/display_pins.h if your wiring differs from the defaults.

[env:esp32s3]
platform = espressif32
; DevKitC-1 class, but this module has 4 MB flash (not 8 MB)
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
framework = arduino
monitor_speed = 115200
monitor_filters = direct
; ESP32-S3 native USB CDC: disable DTR/RTS or Windows monitor often fails with PermissionError
monitor_rts = 0
monitor_dtr = 0

; esptool + COM port (reliable on Windows once the board shows up in Device Manager)
upload_protocol = esptool
upload_speed = 460800
board_upload.wait_for_upload_port = true

; ESP32-S3 native USB serial (Waveshare ESP32-S3 Mini / DevKitC-1 class boards)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
    adafruit/Adafruit GFX Library @ ^1.12.1
    adafruit/Adafruit BusIO @ ^1.17.2
