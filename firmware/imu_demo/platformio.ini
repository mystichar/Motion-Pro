; Motion Pro — IMU + LCD live readout (ESP32-S3 + ST7789 + ISM330DHCX)
;
; Deploy:
;   cd firmware/imu_demo
;   python -m platformio run -t upload
;   python -m platformio device monitor
;
; Pin map: motion_pro_pinout.md

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_protocol = esptool
upload_speed = 460800
board_upload.wait_for_upload_port = true
extra_scripts = pre:scripts/pre_build.py

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
    adafruit/Adafruit GFX Library @ ^1.12.1
    adafruit/Adafruit BusIO @ ^1.17.2
    https://github.com/sparkfun/SparkFun_6DoF_ISM330DHCX_Arduino_Library.git
